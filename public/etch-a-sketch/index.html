<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" href="App.css">
    <title>Etch-a-sketch</title>
</head>

<body>
    <div class="navigation">
        <div class="logo"><a href='/'>Ryan Irani</a></div>
        <ul class="menu">
            <li><a href='/'>Home</a></li>
            <li><a href='/#about'>About</a></li>
            <li><a href='/#projects'>Projects</a></li>
            <li><a href='/#contact'>Contact</a></li>
        </ul>
    </div>
    <header class="header">
        <h1 class="title">Etch-a-sketch</h1>
    </header>
    <div class="sketchpad" id="container"></div>
    <p id="text"></p>
    <div class="user-inputs">
            <label for="resize">
            <input type="range" id="resize" min="2" max="100" value="30"></input>
            </label>    
            <label for="color">
            <input type="color" id="color" name="color">
            </label>
    </div>
    <div class="buttons">
        <button id="clear">Clear</button>
        <button id="undo">Undo</button>
        <button id="save">Save</button>
        <button id="load">Load</button>
    </div>
    <footer class="footer">
        <a href="https://github.com/justryan55?tab=repositories" target="_blank" rel="noreferrer" title="Github">
            <img src="github-icon.svg" github icon"></img>
        </a>
        <p class="footer-text">Ryan Irani 2024</p>
    </footer>
<script src="javascript.js"></script>
</body>
</html>
